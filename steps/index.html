<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Activity per day</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  /* Variables on :root so EVERY element (incl. the tooltip outside .viz-root)
     inherits them. */
  :root {
    --page:      #f9f9f7;
    --surface:   #fcfcfb;
    --primary:   #0b0b0b;
    --secondary: #52514e;
    --muted:     #6f6e69;
    --grid:      #e1e0d9;
    --axis:      #c3c2b7;
    --border:    rgba(11,11,11,0.10);
    --s100:#cde2fb; --s200:#9ec5f4; --s300:#6da7ec; --s400:#3987e5;
    --s500:#256abf; --s600:#184f95; --s700:#0d366b;
    --empty:#e6e4dd;
    --series-1:#256abf;
    --tip-bg:#0b0b0b; --tip-fg:#ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:#0d0d0d; --surface:#1a1a19; --primary:#fff; --secondary:#c3c2b7;
      --muted:#9c9a92; --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,0.10);
      --empty:#2a2a27; --series-1:#3987e5;
      --tip-bg:#ffffff; --tip-fg:#0b0b0b;
    }
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body {
    background:var(--page); color:var(--primary);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    padding:32px; -webkit-font-smoothing:antialiased;
  }
  .viz-root { max-width:1080px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  h1 { font-size:22px; margin:0 0 2px; }
  .sub { color:var(--secondary); font-size:13px; margin:0 0 20px; }

  .seg.lang { margin-bottom:0; flex:0 0 auto; }
  .seg.lang button { padding:7px 12px; font-weight:650; letter-spacing:.03em; }

  .seg {
    display:inline-flex; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:3px; gap:2px; margin-bottom:24px;
  }
  .seg button {
    border:0; background:none; color:var(--secondary); font-size:13px;
    padding:7px 15px; border-radius:7px; cursor:pointer; font-weight:550;
  }
  .seg button:hover { color:var(--primary); }
  .seg button.active { background:var(--series-1); color:#fff; }

  .tiles { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:28px; }
  .tile {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 20px; min-width:150px; flex:1;
  }
  .tile .label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .tile .value { font-size:28px; font-weight:650; margin-top:4px; }
  .tile .value small { font-size:15px; font-weight:500; color:var(--secondary); }
  .tile .value .subd { font-size:14px; font-weight:500; color:var(--secondary); }

  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:20px 24px; margin-bottom:24px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .card h2 { font-size:14px; margin:0 0 16px; font-weight:600; }
  /* Each metric switch tears down and repaints the SVGs; a short fade-in makes
     that read as a smooth transition rather than a flash (Law 3: hide the wait). */
  @keyframes chart-in { from { opacity:0; } to { opacity:1; } }
  #calendar svg, #trendChart svg, #hourChart svg, #weekdayChart svg { animation:chart-in .18s ease-out; }
  @media (prefers-reduced-motion: reduce) {
    #calendar svg, #trendChart svg, #hourChart svg, #weekdayChart svg { animation:none; }
  }
  .charts-row { display:flex; flex-wrap:wrap; gap:32px; }
  .charts-row > div { flex:1; min-width:320px; }
  .chart-title { font-size:13px; font-weight:600; margin:0 0 10px; }
  .takeaway { font-size:13px; color:var(--secondary); margin:18px 0 0; line-height:1.5; }
  .takeaway b { color:var(--primary); font-weight:650; }

  /* SVG text: legible ink, not near-invisible greys */
  text { fill:var(--secondary); font-size:11px; }
  .month-label { fill:var(--secondary); font-size:11px; }
  .year-label { fill:var(--primary); font-size:13px; font-weight:700; }
  .year-avg   { fill:var(--primary); font-size:14px; font-weight:650; font-variant-numeric:tabular-nums; }
  .year-avg-unit { fill:var(--secondary); font-size:11px; }
  .axis path, .axis line { stroke:var(--axis); }
  .axis text { fill:var(--secondary); font-size:11px; }
  .grid line { stroke:var(--grid); shape-rendering:crispEdges; }
  .grid path { stroke:none; }
  .bar-label { fill:var(--primary); font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; }

  .legend { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--secondary); margin-top:14px; flex-wrap:wrap; }
  .legend .sw { width:13px; height:13px; border-radius:2px; }

  #tooltip {
    position:fixed; pointer-events:none; opacity:0; transition:opacity .08s;
    background:var(--tip-bg); color:var(--tip-fg); font-size:12.5px;
    padding:8px 11px; border-radius:7px; white-space:nowrap; z-index:10;
    box-shadow:0 6px 20px rgba(0,0,0,.28); line-height:1.35;
  }
  #tooltip b { font-variant-numeric:tabular-nums; font-size:13.5px; }

  /* ---- Mobile ---- */
  @media (max-width: 640px) {
    body { padding:16px 12px; }
    h1 { font-size:19px; }
    .sub { font-size:12px; }
    .seg { width:100%; justify-content:space-between; }
    .seg button { flex:1; padding:8px 6px; font-size:12.5px; }
    .seg.lang { width:auto; }
    .seg.lang button { flex:0 0 auto; padding:7px 12px; }
    .card { padding:14px 14px; }
    .tiles { gap:10px; }
    .tile { min-width:100%; padding:13px 16px; }
    .tile .value { font-size:25px; }
    .charts-row { gap:22px; }
    .charts-row > div { min-width:100%; }
    /* wide time-series scales to fit instead of forcing a scroll */
    #trendChart svg { min-width:0; }
    /* the calendar is inherently wide — let it scroll inside its card */
    #calendar { -webkit-overflow-scrolling:touch; }
    .legend { font-size:11px; }
  }
</style>
</head>
<body>
<div class="viz-root" data-palette="#cde2fb,#9ec5f4,#6da7ec,#3987e5,#256abf,#184f95,#0d366b">
  <div class="header">
    <div>
      <h1 id="h1">📊 Activity per day</h1>
      <p class="sub" id="range">Loading…</p>
    </div>
    <div class="seg lang" id="lang-seg" role="group" aria-label="Language">
      <button data-lang="en">EN</button>
      <button data-lang="fr">FR</button>
    </div>
  </div>

  <div class="seg" id="metric-seg"></div>

  <div class="tiles" id="tiles"></div>

  <div class="card">
    <div id="calendar"></div>
    <div class="legend">
      <span id="legend-fewer">Fewer</span>
      <span class="sw" style="background:var(--empty)"></span>
      <span class="sw" style="background:var(--s100)"></span>
      <span class="sw" style="background:var(--s300)"></span>
      <span class="sw" style="background:var(--s500)"></span>
      <span class="sw" style="background:var(--s700)"></span>
      <span id="legend-more">More</span>
    </div>
  </div>

  <div class="card">
    <h2 id="trend-title">Long-term trend</h2>
    <p class="chart-title" id="trend-sub" style="color:var(--secondary);font-weight:500;margin:-10px 0 14px">
      Faint dots are single days; the bold line is a 30-day rolling average.</p>
    <div id="trendChart"></div>
  </div>

  <div class="card">
    <h2 id="pattern-title">When you move</h2>
    <div class="charts-row">
      <div><p class="chart-title" id="hour-title">By hour of day</p><div id="hourChart"></div></div>
      <div><p class="chart-title" id="weekday-title">By day of week</p><div id="weekdayChart"></div></div>
    </div>
    <p class="takeaway" id="takeaway"></p>
  </div>
</div>
<div id="tooltip"></div>

<script>
const tip = d3.select("#tooltip");
function showTip(html, e) {
  tip.html(html).style("opacity", 1)
     .style("left", (e.clientX + 14) + "px").style("top", (e.clientY + 14) + "px");
}
function hideTip() { tip.style("opacity", 0); }
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

const METRICS = {
  steps:    { key:"steps",    unit:"",     perDay:",.0f", total:",.0f" },
  distance: { key:"distance", unit:"km",   perDay:",.1f", total:",.0f" },
  active:   { key:"active",   unit:"kcal", perDay:",.0f", total:",.0f" },
};

// ---------- i18n: d3 locales (dates + numbers) and UI strings ----------
const TIME_LOCALES = {
  en: d3.timeFormatLocale({
    dateTime:"%x, %X", date:"%-m/%-d/%Y", time:"%-I:%M:%S %p", periods:["AM","PM"],
    days:["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
    shortDays:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
    months:["January","February","March","April","May","June","July","August","September","October","November","December"],
    shortMonths:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"] }),
  fr: d3.timeFormatLocale({
    dateTime:"%A %e %B %Y à %X", date:"%d/%m/%Y", time:"%H:%M:%S", periods:["AM","PM"],
    days:["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"],
    shortDays:["dim.","lun.","mar.","mer.","jeu.","ven.","sam."],
    months:["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"],
    shortMonths:["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."] }),
};
const NUM_LOCALES = {
  en: d3.formatLocale({ decimal:".", thousands:",",      grouping:[3], currency:["$",""] }),
  fr: d3.formatLocale({ decimal:",", thousands:" ", grouping:[3], currency:[""," €"] }),
};
const STR = {
  en: {
    title:"Activity per day", loading:"Loading…", days:"days",
    metrics:{ steps:"Steps", distance:"Distance", active:"Active energy" },
    totalOf: l => `Total ${l.toLowerCase()}`, dailyAvg:"Daily average", bestDay:"Best day",
    fewer:"Fewer", more:"More",
    trendTitle: l => `Long-term trend — ${l.toLowerCase()}`,
    trendSub:"Faint dots are single days; the bold line is a 30-day rolling average.",
    patternTitle: l => `When you move — ${l.toLowerCase()}`,
    byHour:"By hour of day", byWeekday:"By day of week",
    weekdayShort:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    perDayUnit: u => u ? `${u}/day` : "per day",
    noData:"no data", rollAvg:"30-day avg", avg:"avg",
    rangeDate:"%B %-d, %Y", tileDate:"%b %-d, %Y", calDate:"%A, %b %-d, %Y", monthYear:"%b %Y",
    takeaway:(mkey,i,hr)=>{
      const l={steps:"steps",distance:"distance",active:"active energy"}[mkey];
      const D=["Mondays","Tuesdays","Wednesdays","Thursdays","Fridays","Saturdays","Sundays"];
      const ap=h=>(h%12||12)+(h<12?"am":"pm");
      return `You rack up the most ${l} on <b>${D[i]}</b>, and around <b>${ap(hr)}–${ap((hr+1)%24)}</b>.`;
    },
  },
  fr: {
    title:"Activité par jour", loading:"Chargement…", days:"jours",
    metrics:{ steps:"Pas", distance:"Distance", active:"Énergie active" },
    totalOf: l => `${l} au total`, dailyAvg:"Moyenne par jour", bestDay:"Meilleur jour",
    fewer:"Moins", more:"Plus",
    trendTitle: l => `Tendance long terme — ${l.toLowerCase()}`,
    trendSub:"Les points pâles sont des jours isolés ; la ligne épaisse est une moyenne glissante sur 30 jours.",
    patternTitle: l => `Quand tu bouges — ${l.toLowerCase()}`,
    byHour:"Par heure de la journée", byWeekday:"Par jour de la semaine",
    weekdayShort:["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"],
    perDayUnit: u => u ? `${u}/jour` : "par jour",
    noData:"pas de donnée", rollAvg:"moy. 30 j", avg:"moy.",
    rangeDate:"%-d %B %Y", tileDate:"%-d %b %Y", calDate:"%A %-d %b %Y", monthYear:"%b %Y",
    takeaway:(mkey,i,hr)=>{
      const de={steps:"de pas",distance:"de distance",active:"d’énergie active"}[mkey];
      const D=["le lundi","le mardi","le mercredi","le jeudi","le vendredi","le samedi","le dimanche"];
      return `C’est <b>${D[i]}</b> et vers <b>${hr}h–${(hr+1)%24}h</b> que tu accumules le plus ${de}.`;
    },
  },
};

const metricFromHash = () => { const k = decodeURIComponent(location.hash.slice(1)); return METRICS[k] ? k : null; };
const savedMetric = (() => { try { const k = localStorage.getItem("metric"); return METRICS[k] ? k : null; } catch { return null; } })();
const savedLang = (() => { try { const l = localStorage.getItem("lang"); return STR[l] ? l : null; } catch { return null; } })();
// priority: URL fragment (shareable link) > last choice > default
let current = metricFromHash() || savedMetric || "steps";
// priority: saved choice > browser language > English
let lang = savedLang || ((navigator.language || "").toLowerCase().startsWith("fr") ? "fr" : "en");
let DAILY, PATTERNS, BYKEY;

// locale-aware formatters, kept in sync with `lang`
let TFMT = TIME_LOCALES[lang], NFMT = NUM_LOCALES[lang];
const fmtTime = pat => TFMT.utcFormat(pat);
const fmtNum  = spec => NFMT.format(spec);
const label   = key => STR[lang].metrics[key];

Promise.all([
  d3.json("../data/daily_metrics.json"),
  d3.json("../data/patterns.json"),
]).then(([daily, patterns]) => {
  const parse = d3.utcParse("%Y-%m-%d");
  DAILY = daily.map(d => ({ date: parse(d.date), key: d.date, steps: d.steps, distance: d.distance, active: d.active }));
  PATTERNS = patterns;

  d3.select("#metric-seg").selectAll("button").data(Object.values(METRICS)).join("button")
    .classed("active", m => m.key === current)
    // Update the URL fragment; the hashchange listener re-renders. Clicking the
    // already-active metric changes nothing (no hashchange fires) — that's fine.
    .on("click", (e, m) => { location.hash = m.key; });

  d3.selectAll("#lang-seg button").on("click", e => applyLang(e.currentTarget.dataset.lang));

  // Reflect the initial metric in the URL without adding a history entry.
  history.replaceState(null, "", "#" + current);
  applyLang(lang);   // sets all static text + formatters, then renders
});

window.addEventListener("hashchange", () => {
  const k = metricFromHash();
  if (k && k !== current) {
    current = k;
    try { localStorage.setItem("metric", current); } catch {}
    render();
  }
});

// Switch language: repoint the formatters, restate every fixed string, re-render.
function applyLang(l) {
  if (!STR[l]) return;
  lang = l;
  try { localStorage.setItem("lang", l); } catch {}
  TFMT = TIME_LOCALES[l]; NFMT = NUM_LOCALES[l];
  const S = STR[l];
  document.documentElement.lang = l;
  document.title = S.title;
  d3.select("#h1").text(`📊 ${S.title}`);
  d3.select("#trend-sub").text(S.trendSub);
  d3.select("#hour-title").text(S.byHour);
  d3.select("#weekday-title").text(S.byWeekday);
  d3.select("#legend-fewer").text(S.fewer);
  d3.select("#legend-more").text(S.more);
  d3.selectAll("#metric-seg button").text(m => S.metrics[m.key]);
  d3.selectAll("#lang-seg button").classed("active", function () { return this.dataset.lang === l; });
  if (DAILY) render();
}

function render() {
  const m = METRICS[current], S = STR[lang];
  d3.selectAll("#metric-seg button").classed("active", d => d.key === current);
  BYKEY = new Map(DAILY.map(d => [d.key, d[current]]));
  const vals = DAILY.map(d => d[current]).filter(v => v > 0);
  const total = d3.sum(vals), avg = d3.mean(vals);
  const best = DAILY.reduce((a, b) => b[current] > a[current] ? b : a);
  const perDay = fmtNum(m.perDay), fmtTotal = fmtNum(m.total);
  const lbl = label(current);

  d3.select("#range").text(
    `${fmtTime(S.rangeDate)(DAILY[0].date)} — ${fmtTime(S.rangeDate)(DAILY[DAILY.length-1].date)}  ·  ${fmtNum(",")(DAILY.length)} ${S.days}`
  );

  const u = m.unit ? " " + m.unit : "";
  const tiles = [
    { label: S.totalOf(lbl),  value: `${fmtTotal(total)}${u}` },
    { label: S.dailyAvg,      value: `${perDay(avg)}${u}` },
    { label: S.bestDay,       value: `${perDay(best[current])}${u}`, sub: fmtTime(S.tileDate)(best.date) },
  ];
  d3.select("#tiles").selectAll(".tile").data(tiles).join("div").attr("class", "tile")
    .html(d => `<div class="label">${d.label}</div>
      <div class="value">${d.value}${d.sub ? `<br><span class="subd">${d.sub}</span>` : ""}</div>`);

  d3.select("#trend-title").text(S.trendTitle(lbl));
  d3.select("#pattern-title").text(S.patternTitle(lbl));

  // Law 10: the peak weekday/hour are already computed for the bars — say them plainly.
  const peakDay = PATTERNS.weekday.reduce((a, b) => b[current] > a[current] ? b : a);
  const peakHr = PATTERNS.hourly.reduce((a, b) => b[current] > a[current] ? b : a);
  d3.select("#takeaway").html(S.takeaway(current, peakDay.weekday, peakHr.hour));

  drawCalendar(m);
  drawTrend(m);
  drawBars("#hourChart", PATTERNS.hourly, d => d.hour, [0,6,12,18,23].map(h=>({v:h,t:h+"h"})), m, "hour");
  drawBars("#weekdayChart", PATTERNS.weekday, d => d.weekday,
           PATTERNS.weekday.map(d=>({v:d.weekday,t:S.weekdayShort[d.weekday]})), m, "weekday");
}

// ---------- Long-term rolling-average trend ----------
function drawTrend(m) {
  d3.select("#trendChart").selectAll("*").remove();
  const days = DAILY.filter(d => d[current] > 0).map(d => ({ date: d.date, v: d[current] }));
  const WIN = 30;
  const roll = days.map((d, i) => {
    const slice = days.slice(Math.max(0, i - WIN + 1), i + 1);
    // Break the line across data gaps > 21 days so we never draw a smooth
    // bridge over days we don't have (honesty over prettiness).
    const def = i === 0 || (d.date - days[i - 1].date) <= 21 * 864e5;
    return { date: d.date, v: d.v, avg: d3.mean(slice, x => x.v), def };
  });

  const W = 1000, H = 300, mg = { top: 16, right: 16, bottom: 28, left: 48 };
  const svg = d3.select("#trendChart").append("svg").attr("width", "100%").attr("height", H)
    .attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio", "xMinYMid meet")
    .style("min-width", "620px").style("max-width", "100%");

  const x = d3.scaleUtc().domain(d3.extent(days, d => d.date)).range([mg.left, W - mg.right]);
  const yMax = d3.quantile(days.map(d => d.v).sort(d3.ascending), 0.99);
  const y = d3.scaleLinear().domain([0, yMax]).nice().range([H - mg.bottom, mg.top]);

  svg.append("g").attr("class", "grid").attr("transform", `translate(${mg.left},0)`)
    .call(d3.axisLeft(y).ticks(4).tickSize(-(W - mg.left - mg.right)).tickFormat(fmtNum("~s")))
    .call(g => g.select(".domain").remove());
  svg.append("g").attr("class", "axis").attr("transform", `translate(0,${H - mg.bottom})`)
    .call(d3.axisBottom(x).ticks(d3.utcYear.every(1)).tickFormat(fmtTime("%Y")));

  // faint daily context (Law 5: keep one element rich so the smooth line reads as intentional)
  svg.append("g").selectAll("circle").data(days).join("circle")
    .attr("cx", d => x(d.date)).attr("cy", d => y(Math.min(d.v, yMax))).attr("r", 1.2)
    .attr("fill", css("--series-1")).attr("opacity", 0.14);

  const area = d3.area().defined(d => d.def).x(d => x(d.date)).y0(y(0)).y1(d => y(d.avg)).curve(d3.curveBasis);
  const line = d3.line().defined(d => d.def).x(d => x(d.date)).y(d => y(d.avg)).curve(d3.curveBasis);
  const grad = svg.append("defs").append("linearGradient").attr("id", "gt")
    .attr("x1", 0).attr("y1", 0).attr("x2", 0).attr("y2", 1);
  grad.append("stop").attr("offset", "0%").attr("stop-color", css("--series-1")).attr("stop-opacity", 0.25);
  grad.append("stop").attr("offset", "100%").attr("stop-color", css("--series-1")).attr("stop-opacity", 0);
  svg.append("path").datum(roll).attr("fill", "url(#gt)").attr("d", area);
  svg.append("path").datum(roll).attr("fill", "none").attr("stroke", css("--series-1"))
    .attr("stroke-width", 2.5).attr("d", line);

  // hover crosshair
  const focus = svg.append("g").style("display", "none");
  focus.append("line").attr("y1", mg.top).attr("y2", H - mg.bottom).attr("stroke", css("--axis"));
  focus.append("circle").attr("r", 4).attr("fill", css("--series-1")).attr("stroke", css("--surface")).attr("stroke-width", 2);
  const bis = d3.bisector(d => d.date).center;
  svg.append("rect").attr("x", mg.left).attr("y", mg.top).attr("width", W - mg.left - mg.right)
    .attr("height", H - mg.top - mg.bottom).attr("fill", "none").attr("pointer-events", "all")
    .on("mousemove", e => {
      const d = roll[bis(roll, x.invert(d3.pointer(e)[0]))];
      focus.style("display", null);
      focus.select("line").attr("x1", x(d.date)).attr("x2", x(d.date));
      focus.select("circle").attr("cx", x(d.date)).attr("cy", y(d.avg));
      showTip(`${fmtTime(STR[lang].monthYear)(d.date)}<br><b>${fmtNum(m.perDay)(d.avg)}${m.unit ? " " + m.unit : ""}</b> · ${STR[lang].rollAvg}`, e);
    })
    .on("mouseleave", () => { focus.style("display", "none"); hideTip(); });
}

// ---------- Calendar heatmap ----------
function drawCalendar(m) {
  d3.select("#calendar").selectAll("*").remove();
  const cell = 13;
  const yearGroups = d3.groups(DAILY, d => d.date.getUTCFullYear()).sort((a,b)=>a[0]-b[0]);
  const years = yearGroups.map(d => d[0]);
  const yearAvg = new Map(yearGroups.map(([y,v]) => {
    const p = v.map(d=>d[current]).filter(x=>x>0);
    return [y, p.length ? d3.mean(p) : 0];
  }));
  const maxV = d3.quantile(DAILY.map(d=>d[current]).filter(v=>v>0).sort(d3.ascending), 0.98) || 1;
  const ramp = ["--s100","--s200","--s300","--s400","--s500","--s600","--s700"].map(css);
  const color = d3.scaleQuantize().domain([Math.max(1e-6, maxV*0.02), maxV]).range(ramp);

  const marginTop = 16, headerH = 20, marginLeft = 46, yearH = cell*7 + 20;
  const width = marginLeft + 53*cell + 108;
  const height = marginTop + headerH + years.length*yearH;
  const svg = d3.select("#calendar").append("svg")
    .attr("width", width).attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`).style("min-width", width+"px");
  const timeWeek = d3.utcSunday, fmtDay = d3.utcFormat("%Y-%m-%d");

  // Month labels ONCE at the top — every year's grid starts at January in the
  // same column, so one header serves all rows (positions from the densest year).
  const refYear = yearGroups.reduce((a,b) => b[1].length > a[1].length ? b : a)[0];
  const refMonths = d3.utcMonths(new Date(Date.UTC(refYear,0,1)), new Date(Date.UTC(refYear,11,31)));
  svg.append("g").attr("transform", `translate(${marginLeft},${marginTop + 10})`)
    .selectAll("text").data(refMonths).join("text").attr("class","month-label")
    .attr("x", mo => timeWeek.count(d3.utcYear(mo), mo)*cell).attr("y", 0)
    .text(fmtTime("%b"));

  years.forEach((year, i) => {
    const g = svg.append("g").attr("transform", `translate(${marginLeft},${marginTop + headerH + i*yearH + 8})`);
    g.append("text").attr("class","year-label").attr("x", -marginLeft+2).attr("y", cell*3.5)
      .attr("dominant-baseline","middle").text(year);

    const days = d3.utcDays(new Date(Date.UTC(year,0,1)), new Date(Date.UTC(year+1,0,1)));
    g.selectAll(".cell").data(days).join("rect")
      .attr("width", cell-2).attr("height", cell-2).attr("rx", 2)
      .attr("stroke", css("--surface")).attr("stroke-width", 2)
      .attr("x", d => timeWeek.count(d3.utcYear(d), d)*cell)
      .attr("y", d => d.getUTCDay()*cell)
      .attr("fill", d => { const v = BYKEY.get(fmtDay(d)); return v>0 ? color(Math.min(v,maxV)) : css("--empty"); })
      .on("mousemove", (e,d) => {
        const v = BYKEY.get(fmtDay(d));
        showTip(`${fmtTime(STR[lang].calDate)(d)}<br><b>${v>0 ? fmtNum(m.perDay)(v)+(m.unit?" "+m.unit:"") : STR[lang].noData}</b>`, e);
      })
      .on("mouseleave", hideTip);

    const gx = 53*cell + 12;
    g.append("text").attr("class","year-avg").attr("x", gx).attr("y", cell*3.5-6)
      .attr("dominant-baseline","middle").text(fmtNum(m.perDay)(yearAvg.get(year)));
    g.append("text").attr("class","year-avg-unit").attr("x", gx).attr("y", cell*3.5+10)
      .attr("dominant-baseline","middle").text(STR[lang].perDayUnit(m.unit));
  });
}

// ---------- Generic bar chart (hour / weekday) ----------
function drawBars(sel, data, xkey, ticks, m, kind) {
  d3.select(sel).selectAll("*").remove();
  const W = 480, H = 240, mg = { top: 22, right: 12, bottom: 26, left: 46 };
  const svg = d3.select(sel).append("svg").attr("width","100%").attr("height",H)
    .attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","xMinYMid meet");

  const x = d3.scaleBand().domain(data.map(xkey)).range([mg.left, W-mg.right]).padding(0.22);
  const y = d3.scaleLinear().domain([0, d3.max(data, d=>d[current])*1.15 || 1]).nice().range([H-mg.bottom, mg.top]);

  svg.append("g").attr("class","grid").attr("transform",`translate(${mg.left},0)`)
    .call(d3.axisLeft(y).ticks(4).tickSize(-(W-mg.left-mg.right)).tickFormat(fmtNum("~s")))
    .call(g => g.select(".domain").remove());

  svg.append("g").attr("class","axis").attr("transform",`translate(0,${H-mg.bottom})`)
    .selectAll("text").data(ticks).join("text")
    .attr("x", d => x(d.v)+x.bandwidth()/2).attr("y", 16).attr("text-anchor","middle").text(d=>d.t);
  svg.append("line").attr("x1", mg.left).attr("x2", W-mg.right).attr("y1", H-mg.bottom).attr("y2", H-mg.bottom)
    .attr("stroke", css("--axis"));

  const peak = d3.max(data, d=>d[current]);
  svg.selectAll(".bar").data(data).join("rect")
    .attr("x", d=>x(xkey(d))).attr("width", x.bandwidth())
    .attr("y", d=>y(d[current])).attr("height", d=>y(0)-y(d[current]))
    .attr("rx", 3).attr("fill", css("--series-1"))
    .attr("opacity", d => d[current]===peak ? 1 : 0.82)
    .on("mousemove", (e,d) => {
      const lbl = kind==="hour" ? d.hour+":00–"+(d.hour+1)+":00" : STR[lang].weekdayShort[d.weekday];
      showTip(`${lbl}<br><b>${fmtNum(m.perDay)(d[current])}${m.unit?" "+m.unit:""}</b> ${STR[lang].avg}`, e);
    })
    .on("mouseleave", hideTip);

  const pk = data.find(d=>d[current]===peak);
  svg.append("text").attr("class","bar-label")
    .attr("x", x(xkey(pk))+x.bandwidth()/2).attr("y", y(peak)-6)
    .attr("text-anchor","middle").text(fmtNum(m.perDay)(peak));
}
</script>
